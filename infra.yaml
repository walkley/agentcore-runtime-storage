AWSTemplateFormatVersion: '2010-09-09'
Description: S3 Files for AgentCore Runtime

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  PrivateSubnetA:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnetB:
    Type: AWS::EC2::Subnet::Id

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: AgentCore + S3 Files
      VpcId: !Ref VpcId

  SecurityGroupSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      SourceSecurityGroupId: !Ref SecurityGroup

  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  S3FilesRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3FilesAssumeRole
            Effect: Allow
            Principal:
              Service: elasticfilesystem.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3files:${AWS::Region}:${AWS::AccountId}:file-system/*"
      Policies:
        - PolicyName: S3BucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3BucketPermissions
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource: !GetAtt DataBucket.Arn
                Condition:
                  StringEquals:
                    aws:ResourceAccount: !Ref AWS::AccountId
              - Sid: S3ObjectPermissions
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:DeleteObject*
                  - s3:GetObject*
                  - s3:List*
                  - s3:PutObject*
                Resource: !Sub "${DataBucket.Arn}/*"
                Condition:
                  StringEquals:
                    aws:ResourceAccount: !Ref AWS::AccountId
              - Sid: EventBridgeManage
                Effect: Allow
                Action:
                  - events:DeleteRule
                  - events:DisableRule
                  - events:EnableRule
                  - events:PutRule
                  - events:PutTargets
                  - events:RemoveTargets
                Condition:
                  StringEquals:
                    events:ManagedBy: elasticfilesystem.amazonaws.com
                Resource:
                  - "arn:aws:events:*:*:rule/DO-NOT-DELETE-S3-Files*"
              - Sid: EventBridgeRead
                Effect: Allow
                Action:
                  - events:DescribeRule
                  - events:ListRuleNamesByTarget
                  - events:ListRules
                  - events:ListTargetsByRule
                Resource:
                  - "arn:aws:events:*:*:rule/*"

  S3FileSystem:
    Type: AWS::S3Files::FileSystem
    Properties:
      Bucket: !GetAtt DataBucket.Arn
      RoleArn: !GetAtt S3FilesRole.Arn

  MountTargetA:
    Type: AWS::S3Files::MountTarget
    Properties:
      FileSystemId: !Ref S3FileSystem
      SubnetId: !Ref PrivateSubnetA
      SecurityGroups: [!Ref SecurityGroup]

  MountTargetB:
    Type: AWS::S3Files::MountTarget
    Properties:
      FileSystemId: !Ref S3FileSystem
      SubnetId: !Ref PrivateSubnetB
      SecurityGroups: [!Ref SecurityGroup]

  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: agentcore-s3files-agent

  S3FilesClientPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${AWS::StackName}-s3files-client"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3FilesMount
            Effect: Allow
            Action:
              - s3files:ClientMount
              - s3files:ClientWrite
              - elasticfilesystem:ClientMount
              - elasticfilesystem:ClientWrite
              - elasticfilesystem:DescribeMountTargets
            Resource: "*"
          - Sid: S3ObjectReadAccess
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
            Resource: !Sub "${DataBucket.Arn}/*"
          - Sid: S3BucketListAccess
            Effect: Allow
            Action: s3:ListBucket
            Resource: !GetAtt DataBucket.Arn

Outputs:
  FileSystemId:
    Value: !GetAtt S3FileSystem.FileSystemId
  SecurityGroupId:
    Value: !Ref SecurityGroup
  Subnets:
    Value: !Sub "${PrivateSubnetA},${PrivateSubnetB}"
  EcrRepositoryUri:
    Value: !GetAtt EcrRepository.RepositoryUri
  BucketName:
    Value: !Ref DataBucket
  S3FilesClientPolicyArn:
    Value: !Ref S3FilesClientPolicy
